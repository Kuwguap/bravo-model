# Render blueprint for the central bot + dashboard.
# Root Directory: apps/central-bot. Add the env vars below in the dashboard.
services:
  - type: web
    name: speedy-central-bot
    runtime: node
    rootDir: apps/central-bot
    buildCommand: corepack enable && pnpm install --frozen-lockfile
    startCommand: pnpm start
    healthCheckPath: /health
    envVars:
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM
        sync: false
      - key: APP_URL
        sync: false
      - key: RENEWAL_PERIOD_DAYS
        value: "28"
      - key: TELEGRAM_CENTRAL_BOT_TOKEN
        sync: false
      - key: CENTRAL_PUBLIC_URL
        sync: false

