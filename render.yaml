# Render Blueprint for the two bots (repo root — Render reads render.yaml here).
#
# Deploy: Render Dashboard → New → Blueprint → connect the GitHub repo
# (Kuwguap/bravo-model). Render creates both services below. You'll be prompted
# for the `sync: false` secrets during apply; the rest are pre-filled.
#
# The websites (tag-site, insurance-site) live on Vercel and are NOT in this
# blueprint. The bots depend on @speedy/shared via a file: path, so plain npm
# works (no pnpm/corepack): the build installs the shared package's own deps
# (`--prefix ../../packages/shared`) then the bot's, and starts with node.
#
# Free instances spin down when idle, which drops Telegram webhook delivery —
# use `starter` (or higher) for always-on bots.

services:
  # ── Dispatch bot ─────────────────────────────────────────────────────────
  - type: web
    name: nj-dispatch-bot
    runtime: node
    plan: starter
    rootDir: apps/dispatch-bot
    buildCommand: npm install --prefix ../../packages/shared && npm install
    startCommand: node src/index.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Secrets — you enter these when applying the blueprint:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: DISPATCH_SHARED_SECRET # must match the tag-site Vercel project
        sync: false
      - key: INTEGRATIONS_API_KEY # must match the insurance-site Vercel project
        sync: false
      # Pre-filled:
      - key: SENDGRID_FROM
        value: no-reply@njtemporarytag.com
      - key: APP_NAME
        value: NJ Temporary Tag
      - key: APP_URL
        value: https://njtemporarytag.com
      - key: INSURANCE_SITE_URL
        value: https://njportal.us
      - key: INSURANCE_OPT_IN_PRICE
        value: "100"
      - key: FALLBACK_CLAIM_TIMEOUT_MS
        value: "300000"
      # DISPATCH_PUBLIC_URL is auto-derived from Render's RENDER_EXTERNAL_URL,
      # so the bot self-registers its Telegram webhook. Override only if needed.

  # ── Central bot + dashboard ──────────────────────────────────────────────
  - type: web
    name: nj-central-bot
    runtime: node
    plan: starter
    rootDir: apps/central-bot
    buildCommand: npm install --prefix ../../packages/shared && npm install
    startCommand: node src/index.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: ADMIN_PASSWORD # dashboard login
        sync: false
      - key: TELEGRAM_CENTRAL_BOT_TOKEN
        sync: false
      - key: SESSION_SECRET
        generateValue: true # Render generates a random value
      - key: SENDGRID_FROM
        value: no-reply@njtemporarytag.com
      - key: APP_URL
        value: https://njtemporarytag.com
      - key: RENEWAL_PERIOD_DAYS
        value: "28"
      - key: RENEWAL_SWEEP_MINUTES
        value: "360"
      # CENTRAL_PUBLIC_URL is auto-derived from RENDER_EXTERNAL_URL.

  # ── Communications bot (Facebook Messenger lead-gen) ─────────────────────
  - type: web
    name: nj-comms-bot
    runtime: node
    plan: starter
    rootDir: apps/comms-bot
    buildCommand: npm install --prefix ../../packages/shared && npm install
    startCommand: node src/index.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY # for chat-payment checkout links
        sync: false
      - key: FB_PAGE_ACCESS_TOKEN # Meta Page access token
        sync: false
      - key: FB_APP_SECRET # Meta app secret (webhook signature verification)
        sync: false
      - key: DISPATCH_BOT_URL # hand finished/paid leads to the dispatch bot
        sync: false
      - key: DISPATCH_SHARED_SECRET # must match the dispatch bot
        sync: false
      - key: FB_VERIFY_TOKEN
        value: nj-comms-verify
      - key: APP_URL
        value: https://njtemporarytag.com
      - key: TAG_PRICE
        value: "150"
      - key: INSURANCE_OPT_IN_PRICE
        value: "100"
      - key: COMMS_FOLLOWUP_MINUTES
        value: "60"
      - key: COMMS_MAX_FOLLOWUPS
        value: "2"
